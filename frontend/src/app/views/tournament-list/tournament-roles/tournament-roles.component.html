<ng-container id="tournament-roles" *transloco="let t">
  @if (loadingGlobal) {
    <biit-progress-bar [type]="BiitProgressBarType.INDETERMINATE"></biit-progress-bar>
  }
  <div class="canvas" slot="{{'empty' | transloco}}">
    <div cdkDropListGroup class="roles-container">
      <div (cdkDropListDropped)="removeRole($event)" [cdkDropListData]="userListData.filteredParticipants"
        cdkDropList
        class="users-container">
        <user-list [showAvatars]="showAvatars" [userListData]="userListData"></user-list>
      </div>
      <div class="right-panel">
        <fight-statistics-panel [teams]="false" [tournament]="tournament"></fight-statistics-panel>
        <div class="roles">
          @for (roleType of roleTypes; track roleType) {
            <div class="roles-location">
              <div class="role-header">
                <h2 class="role-text">{{ roleType.toLowerCase() | transloco }}</h2>
                @if (countRole(roleType)) {
                  <h2 class="role-counter">(x{{ countRole(roleType) }})</h2>
                }
              </div>
              <div (cdkDropListDropped)="dropParticipant($event, roleType)"
                [cdkDropListData]="getParticipantsContainer(roleType)"
                cdkDropList
                class="role">
                @for (user of participants.get(roleType); track user) {
                  <user-card [activity]="RbacActivity.EDIT_ROLE"
                    [dragDisabled]="user.locked"
                    [showClub]="false"
                  [showAvatar]="showAvatars" [user]="user"></user-card>
                }
              </div>
            </div>
          }
        </div>
      </div>
    </div>
    <div class="buttons-row">
      @if ((RbacActivity.READ_ALL_ROLES | hasPermission)) {
        <button biit-button id="roles-button-download" secondary
          (click)="downloadPDF()">
          {{ t('download') }}
        </button>
      }
      <button biit-button id="tournament-button-close"
        (click)="onClosed.emit()" primary>
        {{ t('close') }}
      </button>
    </div>
  </div>
</ng-container>
