<biit-popup id="tournament-popup"
            [title]="tournament.id ? t('t.tournamentEdit') : t('t.tournamentAdd')"
            (onClosed)="closed.emit(this.originalTournament)"
            closable sixty-view
            *transloco="let t"
>
  <tournament-form class="form-container"
                   [tournament]="tournament"
                   (saved)="saved"
                   [saved]="saved"
                   (errorEvent)="errorEvent"
                   [errorEvent]="errorEvent"></tournament-form>
</biit-popup>
