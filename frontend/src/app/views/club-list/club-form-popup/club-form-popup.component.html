<biit-popup id="club-popup"
  [title]="club.id ? t('t.clubEdit') : t('t.clubAdd')"
  (onClosed)="closed.emit()"
  closable sixty-view
  *transloco="let t"
  >
  <club-form class="form-container"
    [club]="club"
    (saved)="saved"
    [saved]="saved"
    (errorEvent)="error"
  [errorEvent]="error"></club-form>

  <biit-action-button position="top-right">
    @if ((RbacActivity.CREATE_PARTICIPANT_CSV | hasPermission)) {
      <button biit-icon
        [icon]="'upload_general'"
      ></button>
    }
    @if ((RbacActivity.CREATE_PARTICIPANT_CSV | hasPermission)) {
      <button mat-button class="csv-button"
        (click)="fileInput.click()"
        [title]="t('uploadCsvFile')">
        <mat-icon class="kendo-icon" svgIcon="csv-file-small"></mat-icon>
        <label class="visually-hidden" for="club-csv-file-input">{{ t('uploadCsvFile') }}</label>
        <input id="club-csv-file-input" #fileInput (change)="handleFileInput($event)" accept="text/csv" style="display:none;"
          type="file"/>
      </button>
    }
  </biit-action-button>
</biit-popup>
