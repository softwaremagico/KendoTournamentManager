<biit-popup id="participant-popup"
  [title]="participant.id ? t('t.participantEdit') : t('t.participantAdd')"
  (onClosed)="closed.emit()"
  closable sixty-view
  *transloco="let t"
  >
  <participant-form class="form-container"
    [participant]="participant"
    (saved)="saved"
    [saved]="saved"
    (errorEvent)="errorEvent"
  [errorEvent]="errorEvent"></participant-form>

  <biit-action-button class="floating-menu" position="top-right">
    @if ((RbacActivity.CREATE_PARTICIPANT_CSV | hasPermission)) {
      <button biit-icon
        [icon]="'upload_general'"
      ></button>
    }
    @if ((RbacActivity.CREATE_PARTICIPANT_CSV | hasPermission)) {
      <button mat-button
        (click)="fileInput.click()"
        [title]="t('uploadCsvFile')">
        <mat-icon class="kendo-icon" svgIcon="csv-file-small"></mat-icon>
        <label class="visually-hidden" for="participant-csv-file-input">{{ t('uploadCsvFile') }}</label>
        <input id="participant-csv-file-input" #fileInput (change)="handleFileInput($event)" accept="text/csv" style="display:none;"
          type="file"/>
      </button>
    }
  </biit-action-button>
</biit-popup>
