<mat-card [cdkDragData]="user" [cdkDragDisabled]="dragDisabled || !(activity | hasPermission)"
  cdkDrag
  class="user-card" (click)="clickEvent.emit(user)" (keydown)="clickEvent.emit(user)">
  <mat-card-header class="user-card-header">
    @if (showAvatar) {
      <participant-picture [participant]="user" mat-card-avatar></participant-picture>
    }
    <mat-card-title class="user-card-title">{{ user.lastname }}, {{ user.name }}</mat-card-title>
    @if (showClub) {
      <mat-card-subtitle class="user-card-subtitle">{{ user.club ? user.club.name : "" }}</mat-card-subtitle>
    }
    @if (user.locked) {
      <biit-icon [name]="'exclamation'" [svgStyle]="{backgroundColor: 'transparent'}" [pathStyle]="{fill: '#001fff'}"
      style="width: 24px; height: 24px; position: absolute; right: 16px; top: 16px;"></biit-icon>
    }
  </mat-card-header>
  <mat-card-content class="user-card-content">
  </mat-card-content>
</mat-card>
