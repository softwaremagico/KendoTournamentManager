<div class="team-area">
  <div class="team-name">{{ team.name }}</div>
  <div class="users-container">
    @for (user of members; track user) {
      <user-card [user]="user" [dragDisabled]="true"
        (clickEvent)="selectUser($event)"
      [ngClass]="{'selected': selectedMembers.indexOf(user)>-1}"></user-card>
    }
  </div>
</div>
