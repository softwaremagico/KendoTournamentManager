<filter (filterChanged)="filter($event)" (reset)="filter('')"></filter>
@if (userListData.filteredParticipants) {
  <div class="user-list">
    @for (user of userListData.filteredParticipants; track user) {
      <user-card [dragDisabled]="user.locked"
        [showAvatar]="showAvatars"
      [user]="user"></user-card>
    }
  </div>
}
