<div class="container">
  @if (totalDuels >= 2) {
    <biit-tab-group class="teams-tabs" id="teams-tabs">
      @for (team of teams; track team; let i = $index) {
        <biit-tab
          [name]="teams[(i%(teams.length))].name + ' - ' +teams[((i+1)%(teams.length))].name">
          <div class="untie-generator">
            <member-selector (selectedMember)="setCompetitor1(i, $event)"
            [team]="teams[(i%(teams.length))]" [selections]="1"></member-selector>
            <member-selector (selectedMember)="setCompetitor2(i, $event)"
            [team]="teams[((i+1)%(teams.length))]" [selections]="1"></member-selector>
          </div>
        </biit-tab>
      }
    </biit-tab-group>
  }
  @if (totalDuels == 1) {
    <div>
      <div class="untie-generator">
        <member-selector (selectedMember)="setCompetitor1(0, $event)" [team]="teams[0]" [selections]="1">
        </member-selector>
        <member-selector (selectedMember)="setCompetitor2(0, $event)" [team]="teams[1]" [selections]="1">
        </member-selector>
      </div>
    </div>
  }
  <div class="button-container">
    <button biit-button secondary
      (click)="closeDialog()" color="secondary">
      {{ 'cancel' | transloco }}
    </button>
    @if ((RbacActivity.CREATE_DUEL | hasPermission)) {
      <button biit-button primary
        (click)="createFights()"
        [disabled]="!duelsCompleted()">
        {{ 'accept' | transloco }}
      </button>
    }
  </div>
</div>
