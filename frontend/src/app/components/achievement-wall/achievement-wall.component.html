@if (view && groupedAchievements) {
  <div class="achievement-wall">
    @for (achievementType of totalAchievementsTypes; track achievementType; let i = $index) {
      <achievement-tile class="achievement-tile"
        [achievementType]="achievementType" [achievements]="groupedAchievements.get(achievementType)"
      [view]="view"></achievement-tile>
    }
  </div>
}
