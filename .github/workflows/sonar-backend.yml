name: Sonar Backend
on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/**'
    branches:
      - main
      - master
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/**'
    types:
      - opened
      - synchronize
      - reopened



jobs:
  build:
    name: Build and Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Disabling shallow clones is recommended for improving the relevancy of reporting
          fetch-depth: 0
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Build and run tests
        run: mvn -B clean verify --file backend/pom.xml

      - name: Sonar analysis (Maven plugin)
        run: |
          mvn -B sonar:sonar --file backend/pom.xml \
            -Dsonar.organization=softwaremagico \
            -Dsonar.projectKey=kendo-tournament-backend \
            -Dsonar.projectName="Kendo Tournament Manager" \
            -Dsonar.token="${{ secrets.SONAR_TOKEN }}"
