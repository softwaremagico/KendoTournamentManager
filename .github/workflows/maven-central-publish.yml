name: Publish to Maven Central

# Trigger when a release is published
on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  deploy:
    name: Deploy to Maven Central
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Import GPG private key
        shell: bash
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${GPG_PRIVATE_KEY:-}" ]; then
            echo "ERROR: secret GPG_PRIVATE_KEY is empty or not configured." >&2
            exit 1
          fi

          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          touch ~/.gnupg/gpg.conf ~/.gnupg/gpg-agent.conf
          chmod 600 ~/.gnupg/gpg.conf ~/.gnupg/gpg-agent.conf

          # Normalize secret content for the most common storage variants in GitHub Secrets:
          # 1) raw ASCII armored block
          # 2) one-line text with escaped \n
          # 3) legacy base64 string
          KEY_NORMALIZED="$(printf '%s' "$GPG_PRIVATE_KEY" | tr -d '\r')"
          if printf '%s' "$KEY_NORMALIZED" | grep -q '\\n'; then
            KEY_NORMALIZED="$(printf '%b' "$KEY_NORMALIZED")"
          fi

          if printf '%s' "$KEY_NORMALIZED" | grep -q 'BEGIN PGP PRIVATE KEY BLOCK'; then
            printf '%s' "$KEY_NORMALIZED" | gpg --batch --yes --pinentry-mode loopback --import
          else
            if ! printf '%s' "$KEY_NORMALIZED" | base64 --decode > /tmp/private.key 2>/tmp/base64_error.log; then
              echo "ERROR: GPG_PRIVATE_KEY is neither ASCII armored nor valid base64." >&2
              echo "base64 decode output:" >&2
              cat /tmp/base64_error.log >&2
              exit 1
            fi
            gpg --batch --yes --pinentry-mode loopback --import /tmp/private.key
          fi

          grep -qxF "pinentry-mode loopback" ~/.gnupg/gpg.conf || echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          grep -qxF "no-tty" ~/.gnupg/gpg.conf || echo "no-tty" >> ~/.gnupg/gpg.conf
          grep -qxF "allow-loopback-pinentry" ~/.gnupg/gpg-agent.conf || echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent
          gpg --batch --list-secret-keys --keyid-format LONG

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: ${VERSION}"

      - name: Build and deploy to Maven Central
        run: |
          mvn clean deploy -B \
            -DskipTests \
            -DdeployCentral=true \
            -Dgpg.passphrase="$MAVEN_GPG_PASSPHRASE" \
            -Dgpg.pinentry.mode=loopback \
            --file backend/pom.xml
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Upload deployment logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-central-logs
          path: backend/target/
          retention-days: 5


